				// ---------- 模态框逻辑（字段编辑） ----------
				let currentEditTarget = null;

				function openModal(targetKey) {
					currentEditTarget = targetKey;
					const config = fieldConfig[targetKey];
					if (!config) return;
					modalTitle.textContent = `编辑「${config.label}」`;
					modalLabel.value = config.label;
					if (config.showDefault !== false) {
						modalDefaultGroup.style.display = 'block';
						modalDefault.value = config.defaultValue || '';
					} else {
						modalDefaultGroup.style.display = 'none';
					}
					modalOverlay.classList.add('active');
					modalLabel.focus();
					modalLabel.select();
				}

				function closeModal() {
					modalOverlay.classList.remove('active');
					currentEditTarget = null;
				}

				function confirmModal() {
					if (!currentEditTarget) return;
					const target = currentEditTarget;
					const newLabel = modalLabel.value.trim();
					if (!newLabel) {
						showToast('显示名称不能为空', 'error');
						return;
					}
					const config = fieldConfig[target];
					config.label = newLabel;
					if (config.showDefault !== false) {
						const newDefault = modalDefault.value.trim();
						config.defaultValue = newDefault;
					}
					saveConfig();
					applyFieldLabels();
					renderLevels(getLevelValues());
					renderSteps(getStepValues());
					renderTable();
					showToast(`已更新「${newLabel}」`, 'success');
					closeModal();
				}

				// ---------- 阶层管理 ----------
				let levelCount = 3;

				function getLevelValues() {
					const inputs = levelsContainer.querySelectorAll('.level-input');
					return Array.from(inputs).map(inp => inp.value.trim());
				}

				function renderLevels(values) {
					let html = '';
					for (let i = 0; i < levelCount; i++) {
						const val = values && values[i] !== undefined ? values[i] : '';
						html += `
                        <div class="level-row" data-level-index="${i}">
                            <span class="level-index">${i+1}</span>
                            <input type="text" class="level-input" placeholder="输入第${i+1}列" value="${escapeHtml(val)}" />
                            ${levelCount > 1 ? `<button class="btn-del-level" data-level="${i}" title="删除此行">✕</button>` : ''}
                        </div>
                    `;
					}
					levelsContainer.innerHTML = html;
					levelCountDisplay.textContent = levelCount;
					removeLevelBtn.disabled = (levelCount <= 1);

					levelsContainer.querySelectorAll('.btn-del-level').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const idx = parseInt(this.getAttribute('data-level'), 10);
							if (levelCount > 1) {
								const current = getLevelValues();
								current.splice(idx, 1);
								levelCount = current.length;
								renderLevels(current);
								showToast(`已删除行 ${idx+1}`, 'info');
							}
						});
					});

					levelsContainer.querySelectorAll('.level-input').forEach(inp => {
						inp.addEventListener('keydown', function(e) {
							if (e.key === 'Enter') {
								e.preventDefault();
								addRow();
							}
						});
					});
				}

				function addLevel() {
					levelCount++;
					const current = getLevelValues();
					current.push('');
					renderLevels(current);
					const inputs = levelsContainer.querySelectorAll('.level-input');
					if (inputs.length) {
						inputs[inputs.length - 1].focus();
					}
					showToast(`已添加行 ${levelCount}`, 'info');
				}

				function removeLastLevel() {
					if (levelCount <= 1) {
						showToast('至少保留一行', 'error');
						return;
					}
					const current = getLevelValues();
					current.pop();
					levelCount = current.length;
					renderLevels(current);
					showToast(`已删除行 ${levelCount+1}`, 'info');
				}

				// ---------- 阶层折叠 ----------
				let levelsExpanded = true; // 默认展开

				function toggleLevels() {
					levelsExpanded = !levelsExpanded;
					if (levelsExpanded) {
						levelsBody.classList.remove('hidden');
						levelsToggleIcon.textContent = '▼';
					} else {
						levelsBody.classList.add('hidden');
						levelsToggleIcon.textContent = '▶';
					}
				}

				// ---------- 阶层编辑模态框 ----------
				function openEditLevels() {
					editLevelsTitleInput.value = fieldConfig.levelsSectionTitle.defaultValue;
					const currentVals = getLevelValues();
					renderEditLevels(currentVals);
					editLevelsOverlay.classList.add('active');
					editLevelsTitleInput.focus();
					editLevelsTitleInput.select();
				}

				function closeEditLevels() {
					editLevelsOverlay.classList.remove('active');
				}

				function renderEditLevels(values) {
					let html = '';
					values.forEach((val, idx) => {
						html += `
                        <div class="edit-level-item" data-level-index="${idx}">
                            <span class="level-index">${idx+1}</span>
                            <input type="text" class="edit-level-input" value="${escapeHtml(val)}" />
                            ${values.length > 1 ? `<button class="btn-sm-icon delete" data-level-index="${idx}" title="删除此行">✕</button>` : ''}
                        </div>
                    `;
					});
					editLevelsContainer.innerHTML = html;
					editLevelsRemoveBtn.disabled = (values.length <= 1);

					editLevelsContainer.querySelectorAll('.btn-sm-icon.delete').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const idx = parseInt(this.getAttribute('data-level-index'), 10);
							const current = getEditLevelValues();
							if (current.length <= 1) {
								showToast('至少保留一行', 'error');
								return;
							}
							current.splice(idx, 1);
							renderEditLevels(current);
						});
					});
				}

				function getEditLevelValues() {
					const items = editLevelsContainer.querySelectorAll('.edit-level-item');
					const vals = [];
					items.forEach(item => {
						const input = item.querySelector('.edit-level-input');
						vals.push(input.value.trim());
					});
					return vals;
				}

				function saveEditLevels() {
					const newTitle = editLevelsTitleInput.value.trim();
					if (!newTitle) {
						showToast('标题不能为空', 'error');
						editLevelsTitleInput.focus();
						return;
					}
					const newValues = getEditLevelValues();
					fieldConfig.levelsSectionTitle.defaultValue = newTitle;
					fieldConfig.levelsSectionTitle.label = newTitle;
					levelCount = newValues.length;
					renderLevels(newValues);
					applyFieldLabels();
					saveConfig();
					closeEditLevels();
					showToast(`阶层已更新`, 'success');
				}

				function editLevelsAddRow() {
					const current = getEditLevelValues();
					current.push('');
					renderEditLevels(current);
					const inputs = editLevelsContainer.querySelectorAll('.edit-level-input');
					if (inputs.length) {
						inputs[inputs.length - 1].focus();
					}
				}

				function editLevelsRemoveLastRow() {
					const current = getEditLevelValues();
					if (current.length <= 1) {
						showToast('至少保留一行', 'error');
						return;
					}
					current.pop();
					renderEditLevels(current);
				}

				// ---------- 步骤管理 ----------
				let stepCount = 3;

				function getStepValues() {
					const stepInputs = stepsContainer.querySelectorAll('.step-action-input');
					const expectedInputs = stepsContainer.querySelectorAll('.step-expected-input');
					const result = [];
					for (let i = 0; i < stepInputs.length; i++) {
						result.push({
							step: stepInputs[i].value.trim(),
							expected: expectedInputs[i] ? expectedInputs[i].value.trim() : ''
						});
					}
					return result;
				}

				function renderSteps(values) {
					const prefix = getStepGroupPrefix();
					const actionLabel = getStepActionLabel();
					const expectedLabel = getStepExpectedLabel();
					const count = stepCount;
					let html = '';
					for (let i = 0; i < count; i++) {
						const idx = i + 1;
						const val = values && values[i] ? values[i] : {
							step: '',
							expected: ''
						};
						html += `
                        <div class="step-row" draggable="true" data-step-index="${idx}">
                            <div class="drag-handle" title="拖拽调整顺序">☰</div>
                            <div class="step-group-label">
                                <span class="step-number">${prefix} ${idx}</span>
                                ${idx > 1 ? `<button class="btn-del-step" data-step="${idx}" title="删除此步骤">✕</button>` : ''}
                            </div>
                            <div class="step-fields">
                                <div class="field-item">
                                    <label>${actionLabel}</label>
                                    <textarea class="step-action-input" placeholder="${actionLabel} ${idx} ..." draggable="false">${escapeHtml(val.step)}</textarea>
                                </div>
                                <div class="field-item">
                                    <label>${expectedLabel}</label>
                                    <textarea class="step-expected-input" placeholder="${expectedLabel} ${idx} ..." draggable="false">${escapeHtml(val.expected)}</textarea>
                                </div>
                            </div>
                        </div>
                    `;
					}
					stepsContainer.innerHTML = html;
					stepCountDisplay.textContent = count;
					removeStepBtn.disabled = (count <= 1);
					removeStepBtnBottom.disabled = (count <= 1);

					stepsContainer.querySelectorAll('.btn-del-step').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const idx = parseInt(this.getAttribute('data-step'), 10);
							if (idx > 1) {
								removeStepAt(idx);
							}
						});
					});

					stepsContainer.querySelectorAll('.step-action-input, .step-expected-input').forEach(inp => {
						inp.addEventListener('keydown', function(e) {
							if (e.key === 'Enter' && !e.shiftKey) {
								e.preventDefault();
								addRow();
							}
						});
					});
				}

				function addStep() {
					stepCount++;
					const currentValues = getStepValues();
					currentValues.push({
						step: '',
						expected: ''
					});
					renderSteps(currentValues);
					const inputs = stepsContainer.querySelectorAll('.step-action-input');
					if (inputs.length) {
						inputs[inputs.length - 1].focus();
					}
					showToast(`已添加步骤 ${stepCount}`, 'info');
				}

				function removeLastStep() {
					if (stepCount <= 1) {
						showToast('至少保留一个步骤', 'error');
						return;
					}
					const currentValues = getStepValues();
					currentValues.pop();
					stepCount = currentValues.length;
					renderSteps(currentValues);
					showToast(`已删除步骤 ${stepCount + 1}`, 'info');
				}

				function removeStepAt(index) {
					if (stepCount <= 1 || index <= 1) return;
					const currentValues = getStepValues();
					if (currentValues.length >= index) {
						currentValues.splice(index - 1, 1);
					}
					stepCount = currentValues.length;
					renderSteps(currentValues);
					showToast(`已删除步骤 ${index}`, 'info');
				}

				// ---------- 拖拽排序 ----------
				let dragSrcIndex = null;

				function initDragDrop() {
					stepsContainer.addEventListener('dragstart', function(e) {
						const row = e.target.closest('.step-row');
						if (!row) return;
						if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') {
							e.preventDefault();
							return;
						}
						dragSrcIndex = parseInt(row.dataset.stepIndex, 10) - 1;
						e.dataTransfer.effectAllowed = 'move';
						e.dataTransfer.setData('text/plain', dragSrcIndex);
						row.classList.add('dragging');
					});

					stepsContainer.addEventListener('dragend', function(e) {
						const row = e.target.closest('.step-row');
						if (row) row.classList.remove('dragging');
						stepsContainer.querySelectorAll('.step-row.drag-over').forEach(el => el.classList.remove(
							'drag-over'));
						dragSrcIndex = null;
					});

					stepsContainer.addEventListener('dragover', function(e) {
						e.preventDefault();
						e.dataTransfer.dropEffect = 'move';
						const targetRow = e.target.closest('.step-row');
						if (targetRow) {
							stepsContainer.querySelectorAll('.step-row.drag-over').forEach(el => el.classList.remove(
								'drag-over'));
							targetRow.classList.add('drag-over');
						}
					});

					stepsContainer.addEventListener('dragleave', function(e) {
						const targetRow = e.target.closest('.step-row');
						if (targetRow) {
							targetRow.classList.remove('drag-over');
						}
					});

					stepsContainer.addEventListener('drop', function(e) {
						e.preventDefault();
						const targetRow = e.target.closest('.step-row');
						if (!targetRow) return;
						targetRow.classList.remove('drag-over');
						const targetIndex = parseInt(targetRow.dataset.stepIndex, 10) - 1;
						if (dragSrcIndex === null || targetIndex === dragSrcIndex) return;
						const stepsData = getStepValues();
						[stepsData[dragSrcIndex], stepsData[targetIndex]] = [stepsData[targetIndex], stepsData[
							dragSrcIndex]];
						renderSteps(stepsData);
						showToast(`步骤顺序已调整`, 'info');
					});
				}

				// ---------- 辅助函数 ----------
				function showToast(message, type = 'info', duration = 2400) {
					toast.textContent = message;
					toast.className = 'toast ' + type;
					void toast.offsetWidth;
					toast.classList.add('show');
					clearTimeout(toast._timer);
					toast._timer = setTimeout(() => {
						toast.classList.remove('show');
					}, duration);
				}

				function escapeHtml(str) {
					if (!str) return '';
					const map = {
						'&': '&amp;',
						'<': '&lt;',
						'>': '&gt;',
						'"': '&quot;',
						"'": '&#039;'
					};
					return String(str).replace(/[&<>"']/g, function(m) {
						return map[m];
					});
				}

				// ---------- 获取和验证步骤 ----------
				function getValidSteps(stepsArray) {
					return stepsArray.filter(s => s.step.length > 0 && s.expected.length > 0);
				}

				function validateStep1(steps) {
					if (steps.length === 0) return false;
					const first = steps[0];
					return first.step.length > 0 && first.expected.length > 0;
				}

				function getBaseInput() {
					const title = titleInput.value.trim() || fieldConfig.title.defaultValue;
					const precondition = precondInput.value.trim();
					const priority = prioritySelect.value;
					const remark = remarkInput.value.trim();
					return {
						title,
						precondition,
						priority,
						remark
					};
				}

				function validateBase(data) {
					if (!data.title) {
						showToast(`请输入${fieldConfig.title.label}（必填）`, 'error');
						titleInput.focus();
						return false;
					}
					const allSteps = getStepValues();
					if (!validateStep1(allSteps)) {
						showToast(`步骤1的${getStepActionLabel()}和${getStepExpectedLabel()}不能为空`, 'error');
						const firstInput = stepsContainer.querySelector('.step-action-input');
						if (firstInput) firstInput.focus();
						return false;
					}
					return true;
				}

				// 重置输入区域（不清除用例列表）
				function resetInputs() {
					titleInput.value = fieldConfig.title.defaultValue;
					precondInput.value = fieldConfig.precondition.defaultValue;
					prioritySelect.value = fieldConfig.priority.defaultValue;
					remarkInput.value = fieldConfig.remark.defaultValue;
					const levelVals = getLevelValues();
					levelVals.forEach((v, i) => levelVals[i] = '');
					renderLevels(levelVals);
					const stepVals = getStepValues();
					stepVals.forEach(v => {
						v.step = '';
						v.expected = '';
					});
					renderSteps(stepVals);
					titleInput.focus();
					showToast('输入区域已重置', 'info');
				}

				// ---------- 表格渲染（折叠展示，截断显示，增加复选框） ----------
				function renderTable() {
					const hasData = rows.length > 0;
					rowCount.textContent = rows.length;
					badgeCount.textContent = rows.length + ' 条';
					emptyState.style.display = hasData ? 'none' : 'block';

					let maxLevels = 0;
					rows.forEach(r => {
						if (r.levels && r.levels.length > maxLevels) maxLevels = r.levels.length;
					});
					if (maxLevels < 1) maxLevels = 1;

					const levelHasData = [];
					for (let i = 0; i < maxLevels; i++) {
						let has = false;
						for (let r of rows) {
							if (r.levels && r.levels[i] && r.levels[i].trim() !== '') {
								has = true;
								break;
							}
						}
						levelHasData.push(has);
					}
					const activeLevelIndices = levelHasData.map((v, idx) => v ? idx : -1).filter(idx => idx >= 0);
					const displayLevelCount = activeLevelIndices.length;

					let maxSteps = 0;
					rows.forEach(r => {
						if (r.steps && r.steps.length > maxSteps) maxSteps = r.steps.length;
					});
					if (maxSteps < 1) maxSteps = 1;

					const prefix = getStepGroupPrefix();
					const actionLabel = getStepActionLabel();
					const expectedLabel = getStepExpectedLabel();
					const levelTitle = getLevelsTitle();

					let headerHtml = `<thead>`;
					headerHtml += `<tr>`;
					headerHtml +=
						`<th rowspan="2" style="width:40px;text-align:center;"><input type="checkbox" id="checkAllHead"></th>`;
					headerHtml += `<th rowspan="2" style="width:50px;text-align:center;">No.</th>`;
					if (displayLevelCount > 0) {
						headerHtml += `<th colspan="${displayLevelCount}" class="group-header">${levelTitle}</th>`;
					}
					headerHtml += `<th rowspan="2">${fieldConfig.title.label}</th>`;
					headerHtml += `<th rowspan="2">${fieldConfig.precondition.label}</th>`;
					headerHtml += `<th rowspan="2">${fieldConfig.priority.label}</th>`;
					headerHtml += `<th rowspan="2">${fieldConfig.remark.label}</th>`;
					for (let i = 1; i <= maxSteps; i++) {
						headerHtml += `<th colspan="2" class="group-header">${prefix} ${i}</th>`;
					}
					headerHtml += `<th rowspan="2" style="width:110px;text-align:center;">操作</th>`;
					headerHtml += `</tr>`;
					headerHtml += `<tr>`;
					if (displayLevelCount > 0) {
						for (let i = 0; i < displayLevelCount; i++) {
							headerHtml += `<th style="text-align:center;">${activeLevelIndices[i] + 1}</th>`;
						}
					}
					for (let i = 1; i <= maxSteps; i++) {
						headerHtml += `<th>${actionLabel}</th><th>${expectedLabel}</th>`;
					}
					headerHtml += `</tr>`;
					headerHtml += `</thead>`;
					tableHead.innerHTML = headerHtml;

					if (!hasData) {
						tableBody.innerHTML = '';
						return;
					}

					let bodyHtml = '';
					rows.forEach((row, index) => {
						const levels = row.levels || [];
						const paddedLevels = [];
						for (let idx of activeLevelIndices) {
							paddedLevels.push(idx < levels.length ? levels[idx] : '');
						}
						const steps = row.steps || [];
						const paddedSteps = [];
						for (let i = 0; i < maxSteps; i++) {
							if (i < steps.length) {
								paddedSteps.push({
									step: steps[i].step || '',
									expected: steps[i].expected || ''
								});
							} else {
								paddedSteps.push({
									step: '',
									expected: ''
								});
							}
						}

						const truncatedTitle = truncate(row.title, 10);
						const truncatedPrecond = truncate(row.precondition, 10);
						const truncatedPriority = truncate(row.priority, 10);
						const truncatedRemark = truncate(row.remark, 10);
						const truncatedLevels = paddedLevels.map(lv => truncate(lv, 10));

						bodyHtml += `<tr class="main-row" data-index="${index}" style="cursor:pointer;">`;
						bodyHtml +=
							`<td style="text-align:center;"><input type="checkbox" class="row-checkbox" data-index="${index}"></td>`;
						bodyHtml += `<td class="row-index">${index + 1}</td>`;
						truncatedLevels.forEach(lv => {
							bodyHtml += `<td>${escapeHtml(lv)}</td>`;
						});
						bodyHtml += `
				            <td><strong>${escapeHtml(truncatedTitle)}</strong></td>
				            <td style="white-space:pre-wrap;">${escapeHtml(truncatedPrecond)}</td>
				            <td><span class="priority-badge" style="background:#eef3f9;padding:2px 10px;border-radius:12px;font-weight:600;font-size:13px;color:#1a2332;">${escapeHtml(truncatedPriority)}</span></td>
				            <td style="white-space:pre-wrap;">${escapeHtml(truncatedRemark)}</td>`;
						for (let i = 0; i < maxSteps; i++) {
							const stepText = (i < steps.length) ? truncate(steps[i].step, 20) : '';
							const expectedText = (i < steps.length) ? truncate(steps[i].expected, 20) : '';
							bodyHtml += `<td>${escapeHtml(stepText)}</td><td>${escapeHtml(expectedText)}</td>`;
						}
						bodyHtml += `
				            <td style="text-align:center;white-space:nowrap;">
				                <span class="drag-handle-row" draggable="true" title="拖拽排序" style="cursor:grab;margin-right:6px;">☰</span>
				                <button class="btn-action copy" data-index="${index}" title="复制">📋</button>
				                <button class="btn-action edit" data-index="${index}" title="编辑">✎</button>
				                <button class="btn-action delete" data-index="${index}" title="删除">✕</button>
				            </td>
				        </tr>`;

						// 详情行
						bodyHtml += `<tr class="detail-row" data-index="${index}" style="display:none;">`;
						bodyHtml +=
							`<td colspan="${2 + displayLevelCount + 4 + 2*maxSteps + 1}" style="padding: 12px 16px; background: #f7faff;">`;
						bodyHtml += `<div class="detail-content">`;
						const nonEmptyLevels = levels.filter(l => l && l.trim() !== '');
						if (nonEmptyLevels.length > 0) {
							bodyHtml +=
								`<div class="detail-item"><span class="label">${fieldConfig.levelsSectionTitle.label}：</span><span class="value">${escapeHtml(nonEmptyLevels.join(' / '))}</span></div>`;
						}
						bodyHtml +=
							`<div class="detail-item"><span class="label">${fieldConfig.title.label}：</span><span class="value">${escapeHtml(row.title)}</span></div>`;
						bodyHtml +=
							`<div class="detail-item"><span class="label">${fieldConfig.precondition.label}：</span><span class="value">${escapeHtml(row.precondition)}</span></div>`;
						bodyHtml +=
							`<div class="detail-item"><span class="label">${fieldConfig.priority.label}：</span><span class="value">${escapeHtml(row.priority)}</span></div>`;
						bodyHtml +=
							`<div class="detail-item"><span class="label">${fieldConfig.remark.label}：</span><span class="value">${escapeHtml(row.remark)}</span></div>`;
						if (steps.length > 0) {
							bodyHtml += `<div class="step-detail"><strong>步骤详情：</strong>`;
							steps.forEach((s, i) => {
								bodyHtml += `<div style="margin-top:6px;border-top:1px dashed #e2e9f2;padding-top:4px;">
				                    <div><strong>Step ${i+1}</strong></div>
				                    <div><span style="font-weight:500;">${getStepActionLabel()}：</span><span style="white-space:pre-wrap;">${escapeHtml(s.step)}</span></div>
				                    <div><span style="font-weight:500;">${getStepExpectedLabel()}：</span><span style="white-space:pre-wrap;">${escapeHtml(s.expected)}</span></div>
				                </div>`;
							});
							bodyHtml += `</div>`;
						} else {
							bodyHtml +=
								`<div class="detail-item"><span class="label">步骤：</span><span class="value">无</span></div>`;
						}
						bodyHtml += `</div>`;
						bodyHtml += `</td>`;
						bodyHtml += `</tr>`;
					});
					tableBody.innerHTML = bodyHtml;

					// 行点击展开/收起（每次渲染重新绑定）
					tableBody.querySelectorAll('.main-row').forEach(row => {
						row.addEventListener('click', function(e) {
							if (e.target.closest('.btn-action') || e.target.closest(
									'input[type="checkbox"]')) return;
							const index = this.dataset.index;
							const detailRow = tableBody.querySelector(`.detail-row[data-index="${index}"]`);
							if (detailRow) {
								const isVisible = detailRow.style.display !== 'none';
								detailRow.style.display = isVisible ? 'none' : '';
							}
						});
					});

					updateCheckAllState();
				}

				// 全选逻辑
				function updateCheckAllState() {
					const checkboxes = document.querySelectorAll('.row-checkbox');
					const checked = document.querySelectorAll('.row-checkbox:checked');
					const allChecked = checkboxes.length > 0 && checkboxes.length === checked.length;
					checkAll.checked = allChecked;
					const headCheck = document.getElementById('checkAllHead');
					if (headCheck) headCheck.checked = allChecked;
				}

				function bindCheckAll() {
					const headCheck = document.getElementById('checkAllHead');
					if (headCheck) {
						headCheck.addEventListener('change', function() {
							const checked = this.checked;
							document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
							updateCheckAllState();
						});
					}
					checkAll.addEventListener('change', function() {
						const checked = this.checked;
						document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
						updateCheckAllState();
					});
					document.addEventListener('change', function(e) {
						if (e.target.classList.contains('row-checkbox')) {
							updateCheckAllState();
						}
					});
				}

				// 删除选中
				function deleteSelectedRows() {
					const checked = document.querySelectorAll('.row-checkbox:checked');
					if (checked.length === 0) {
						showToast('请至少选择一个用例', 'error');
						return;
					}
					if (!confirm(`确定要删除选中的 ${checked.length} 个用例吗？`)) return;

					const batch = db.batch();
					checked.forEach(cb => {
						const idx = parseInt(cb.dataset.index, 10);
						const row = rows[idx];
						if (row && row.id) {
							const ref = db.collection('testcases').doc(row.id);
							batch.delete(ref);
						}
					});
					batch.commit()
						.then(() => {
							showToast(`已删除 ${checked.length} 个用例`, 'success');
						})
						.catch((err) => {
							showToast('批量删除失败：' + err.message, 'error');
						});
				}

				// 清空所有用例
				function clearAllCasesHandler() {
					if (rows.length === 0) {
						showToast('列表已经是空的', 'info');
						return;
					}
					if (!confirm('确定要清空所有用例吗？此操作不可恢复！')) return;

					const batch = db.batch();
					rows.forEach(row => {
						const ref = db.collection('testcases').doc(row.id);
						batch.delete(ref);
					});
					batch.commit()
						.then(() => {
							showToast('已清空所有用例', 'info');
						})
						.catch((err) => {
							showToast('清空失败：' + err.message, 'error');
						});
				}

				// 复制选中
				function copyRow(index) {
					if (index < 0 || index >= rows.length) return;
					const source = rows[index];

					// 深拷贝数据（不包含 id 和 order）
					const newData = {
						title: source.title,
						precondition: source.precondition,
						priority: source.priority,
						remark: source.remark,
						levels: [...source.levels],
						steps: source.steps.map(s => ({
							step: s.step,
							expected: s.expected
						})),
						order: rows.reduce((max, r) => Math.max(max, r.order || 0), 0) + 1,
						createdAt: firebase.firestore.FieldValue.serverTimestamp(),
						updatedAt: firebase.firestore.FieldValue.serverTimestamp()
					};

					db.collection('testcases').add(newData)
						.then(() => {
							showToast(`已复制「${source.title}」`, 'success');
						})
						.catch(err => {
							showToast('复制失败：' + err.message, 'error');
						});
				}

				// ---------- 数据 ----------
				let rows = [];

				// ---------- 操作 ----------
				function addRow() {
					const base = getBaseInput();
					if (!validateBase(base)) return;

					const allSteps = getStepValues();
					const validSteps = getValidSteps(allSteps);
					const levels = getLevelValues();

					// 构造要存入 Firestore 的数据（不含 id）
					const newData = {
						title: base.title,
						precondition: base.precondition || '',
						priority: base.priority,
						remark: base.remark || '',
						levels: levels,
						steps: validSteps,
						order: maxOrder + 1, // 新增
						createdAt: firebase.firestore.FieldValue.serverTimestamp(),
						updatedAt: firebase.firestore.FieldValue.serverTimestamp()
					};

					// 写入 Firestore
					db.collection('testcases').add(newData)
						.then(() => {
							resetInputs();
							showToast(`✅ 已添加用例「${base.title}」 (${validSteps.length}个步骤)`, 'success');
						})
						.catch((err) => {
							showToast('添加失败：' + err.message, 'error');
						});
				}

				function deleteRow(index) {
					if (index < 0 || index >= rows.length) return;
					const row = rows[index];
					if (!confirm(`确定要删除用例「${row.title}」吗？`)) return;

					db.collection('testcases').doc(row.id).delete()
						.then(() => {
							showToast(`已删除「${row.title}」`, 'info');
						})
						.catch((err) => {
							showToast('删除失败：' + err.message, 'error');
						});
				}

				// ---------- 编辑用例（含阶层） ----------
				let editIndex = -1;

				function openEditCase(index) {
					if (index < 0 || index >= rows.length) return;
					editIndex = index;
					const row = rows[index];
					editTitle.value = row.title || '';
					editPrecondition.value = row.precondition || '';
					editPriority.value = row.priority || 'P0';
					editRemark.value = row.remark || '';
					const levels = row.levels || [''];
					renderEditCaseLevels(levels);
					const steps = row.steps && row.steps.length > 0 ? row.steps : [{
						step: '',
						expected: ''
					}];
					renderEditSteps(steps);
					editOverlay.classList.add('active');
					editTitle.focus();
					editTitle.select();
				}

				function closeEditCase() {
					editOverlay.classList.remove('active');
					editIndex = -1;
				}

				function renderEditCaseLevels(values) {
					let html = '';
					values.forEach((val, idx) => {
						html += `
                        <div class="edit-level-item" data-level-index="${idx}">
                            <span class="level-index">${idx+1}</span>
                            <input type="text" class="edit-case-level-input" value="${escapeHtml(val)}" />
                            ${values.length > 1 ? `<button class="btn-sm-icon delete" data-level-index="${idx}" title="删除此行">✕</button>` : ''}
                        </div>
                    `;
					});
					editCaseLevelsContainer.innerHTML = html;
					editCaseLevelRemoveBtn.disabled = (values.length <= 1);

					editCaseLevelsContainer.querySelectorAll('.btn-sm-icon.delete').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const idx = parseInt(this.getAttribute('data-level-index'), 10);
							const current = getEditCaseLevelValues();
							if (current.length <= 1) {
								showToast('至少保留一层', 'error');
								return;
							}
							current.splice(idx, 1);
							renderEditCaseLevels(current);
						});
					});
				}

				function getEditCaseLevelValues() {
					const items = editCaseLevelsContainer.querySelectorAll('.edit-case-level-input');
					return Array.from(items).map(inp => inp.value.trim());
				}

				function editCaseLevelAdd() {
					const current = getEditCaseLevelValues();
					current.push('');
					renderEditCaseLevels(current);
					const inputs = editCaseLevelsContainer.querySelectorAll('.edit-case-level-input');
					if (inputs.length) {
						inputs[inputs.length - 1].focus();
					}
				}

				function editCaseLevelRemoveLast() {
					const current = getEditCaseLevelValues();
					if (current.length <= 1) {
						showToast('至少保留一层', 'error');
						return;
					}
					current.pop();
					renderEditCaseLevels(current);
				}

				function renderEditSteps(steps) {
					const actionLabel = getStepActionLabel();
					const expectedLabel = getStepExpectedLabel();
					let html = '';
					steps.forEach((item, idx) => {
						const i = idx + 1;
						html += `
                        <div class="edit-step-item" data-step-index="${idx}">
                            <div class="step-header">
                                <span class="step-index">Step ${i}</span>
                                <button class="btn-sm-icon move" data-dir="up" title="上移">↑</button>
                                <button class="btn-sm-icon move" data-dir="down" title="下移">↓</button>
                                ${steps.length > 1 ? `<button class="btn-sm-icon delete" data-step-index="${idx}" title="删除此步骤">✕</button>` : ''}
                            </div>
                            <div class="step-fields">
                                <textarea class="edit-step-action" placeholder="${actionLabel} ${i}">${escapeHtml(item.step)}</textarea>
                                <textarea class="edit-step-expected" placeholder="${expectedLabel} ${i}">${escapeHtml(item.expected)}</textarea>
                            </div>
                        </div>
                    `;
					});
					editStepsContainer.innerHTML = html;

					editStepsContainer.querySelectorAll('.move').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const item = this.closest('.edit-step-item');
							const idx = parseInt(item.dataset.stepIndex, 10);
							const dir = this.getAttribute('data-dir');
							const currentSteps = getEditStepValues();
							if (dir === 'up' && idx > 0) {
								[currentSteps[idx], currentSteps[idx - 1]] = [currentSteps[idx - 1],
									currentSteps[idx]
								];
							} else if (dir === 'down' && idx < currentSteps.length - 1) {
								[currentSteps[idx], currentSteps[idx + 1]] = [currentSteps[idx + 1],
									currentSteps[idx]
								];
							} else {
								return;
							}
							renderEditSteps(currentSteps);
						});
					});

					editStepsContainer.querySelectorAll('.btn-sm-icon.delete').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const idx = parseInt(this.getAttribute('data-step-index'), 10);
							const currentSteps = getEditStepValues();
							if (currentSteps.length <= 1) {
								showToast('至少保留一个步骤', 'error');
								return;
							}
							currentSteps.splice(idx, 1);
							renderEditSteps(currentSteps);
						});
					});
				}

				function getEditStepValues() {
					const items = editStepsContainer.querySelectorAll('.edit-step-item');
					const result = [];
					items.forEach(item => {
						const actionInput = item.querySelector('.edit-step-action');
						const expectedInput = item.querySelector('.edit-step-expected');
						result.push({
							step: actionInput.value.trim(),
							expected: expectedInput.value.trim()
						});
					});
					return result;
				}

				function saveEditCase() {
					const title = editTitle.value.trim();
					if (!title) {
						showToast('Title 不能为空', 'error');
						editTitle.focus();
						return;
					}
					const precondition = editPrecondition.value.trim();
					const priority = editPriority.value;
					const remark = editRemark.value.trim();
					const allSteps = getEditStepValues();
					if (!validateStep1(allSteps)) {
						showToast(`步骤1的${getStepActionLabel()}和${getStepExpectedLabel()}不能为空`, 'error');
						return;
					}
					const validSteps = getValidSteps(allSteps);
					const levels = getEditCaseLevelValues();

					// 更新 Firestore（使用 update）
					const updateData = {
						title: title,
						precondition: precondition,
						priority: priority,
						remark: remark,
						levels: levels,
						steps: validSteps,
						updatedAt: firebase.firestore.FieldValue.serverTimestamp()
					};

					const docId = rows[editIndex].id;
					db.collection('testcases').doc(docId).update(updateData)
						.then(() => {
							closeEditCase();
							showToast(`✅ 已更新用例「${title}」`, 'success');
						})
						.catch((err) => {
							showToast('更新失败：' + err.message, 'error');
						});
				}

				function editAddStepHandler() {
					const currentSteps = getEditStepValues();
					currentSteps.push({
						step: '',
						expected: ''
					});
					renderEditSteps(currentSteps);
					const items = editStepsContainer.querySelectorAll('.edit-step-item');
					if (items.length) {
						const lastTextarea = items[items.length - 1].querySelector('.edit-step-action');
						if (lastTextarea) lastTextarea.focus();
					}
				}

				// ---------- 导出 Excel（多Sheet，按阶层2+3分组） ----------
				async function exportExcel() {
					if (rows.length === 0) {
						showToast('没有数据可导出，请先添加用例', 'error');
						return;
					}

					try {
						let maxSteps = 0;
						rows.forEach(r => {
							if (r.steps && r.steps.length > maxSteps) maxSteps = r.steps.length;
						});
						if (maxSteps < 1) maxSteps = 1;

						const groups = {};
						rows.forEach(row => {
							const levels = row.levels || [];
							const key2 = (levels.length > 1 && levels[1]) ? levels[1].trim() : '';
							const key3 = (levels.length > 2 && levels[2]) ? levels[2].trim() : '';
							const sheetKey = `${key2}_${key3}`;
							if (!groups[sheetKey]) groups[sheetKey] = [];
							groups[sheetKey].push(row);
						});

						function sanitizeSheetName(name) {
							if (!name || name === '_') name = '默认';
							let sanitized = name.replace(/[\\\/\?\*\[\]]/g, '_');
							if (sanitized.length > 31) sanitized = sanitized.substring(0, 31);
							return sanitized || 'Sheet';
						}

						const levelTitle = getLevelsTitle();
						const prefix = getStepGroupPrefix();
						const actionLabel = getStepActionLabel();
						const expectedLabel = getStepExpectedLabel();

						let maxLevels = 0;
						rows.forEach(r => {
							if (r.levels && r.levels.length > maxLevels) maxLevels = r.levels.length;
						});
						const minLevels = 6;
						const displayLevels = Math.max(minLevels, maxLevels);

						const workbook = new ExcelJS.Workbook();

						const groupKeys = Object.keys(groups);
						groupKeys.forEach((key) => {
							const groupRows = groups[key];
							const sheetName = sanitizeSheetName(key);
							const worksheet = workbook.addWorksheet(sheetName);

							const row1 = [];
							row1.push(levelTitle);
							for (let i = 1; i < displayLevels; i++) {
								row1.push(null);
							}
							row1.push(fieldConfig.title.label, fieldConfig.precondition.label,
								fieldConfig.priority.label, fieldConfig.remark.label);
							for (let i = 1; i <= maxSteps; i++) {
								row1.push(`${prefix} ${i}`, null);
							}

							const row2 = [];
							for (let i = 0; i < displayLevels; i++) {
								row2.push('');
							}
							row2.push('', '', '', '');
							for (let i = 1; i <= maxSteps; i++) {
								row2.push(actionLabel, expectedLabel);
							}

							const dataRows = groupRows.map(row => {
								const levels = row.levels || [];
								const paddedLevels = [];
								for (let i = 0; i < displayLevels; i++) {
									paddedLevels.push(i < levels.length ? levels[i] : '');
								}
								const steps = row.steps || [];
								const paddedSteps = [];
								for (let i = 0; i < maxSteps; i++) {
									if (i < steps.length) {
										paddedSteps.push(steps[i].step || '', steps[i].expected || '');
									} else {
										paddedSteps.push('', '');
									}
								}
								return [
									...paddedLevels,
									row.title || '',
									row.precondition || '',
									row.priority || '',
									row.remark || '',
									...paddedSteps,
								];
							});

							const wsData = [row1, row2, ...dataRows];
							wsData.forEach(rowData => {
								worksheet.addRow(rowData);
							});

							const levelStartCol = 1;
							const levelEndCol = levelStartCol + displayLevels - 1;
							const titleCol = levelEndCol + 1;
							const precondCol = titleCol + 1;
							const priorityCol = precondCol + 1;
							const memoCol = priorityCol + 1;
							const stepStartCol = memoCol + 1;

							worksheet.mergeCells(1, levelStartCol, 2, levelEndCol);
							worksheet.mergeCells(1, titleCol, 2, titleCol);
							worksheet.mergeCells(1, precondCol, 2, precondCol);
							worksheet.mergeCells(1, priorityCol, 2, priorityCol);
							worksheet.mergeCells(1, memoCol, 2, memoCol);
							let stepCol = stepStartCol;
							for (let i = 1; i <= maxSteps; i++) {
								worksheet.mergeCells(1, stepCol, 1, stepCol + 1);
								stepCol += 2;
							}

							const rowCount = worksheet.rowCount;
							const colCount = wsData[0].length;
							const borderStyle = {
								top: {
									style: 'thin'
								},
								left: {
									style: 'thin'
								},
								bottom: {
									style: 'thin'
								},
								right: {
									style: 'thin'
								}
							};
							for (let r = 1; r <= rowCount; r++) {
								for (let c = 1; c <= colCount; c++) {
									const cell = worksheet.getCell(r, c);
									cell.border = borderStyle;
								}
							}

							for (let r = 1; r <= rowCount; r++) {
								for (let c = 1; c <= colCount; c++) {
									const cell = worksheet.getCell(r, c);
									if (r <= 2) {
										cell.alignment = {
											horizontal: 'center',
											vertical: 'middle'
										};
									} else {
										cell.alignment = {
											vertical: 'top'
										};
									}
								}
							}

							worksheet.columns.forEach((col, idx) => {
								const colIdx = idx + 1;
								if (colIdx >= levelStartCol && colIdx <= levelEndCol) {
									col.width = 16;
								} else if (colIdx === titleCol) col.width = 20;
								else if (colIdx === precondCol) col.width = 16;
								else if (colIdx === priorityCol) col.width = 10;
								else if (colIdx === memoCol) col.width = 16;
								else col.width = 20;
							});
						});

						const buffer = await workbook.xlsx.writeBuffer();
						const blob = new Blob([buffer], {
							type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
						});
						saveAs(blob, `测试用例_${new Date().toISOString().slice(0,10)}.xlsx`);
						showToast(`✅ 成功导出 ${rows.length} 条用例（${groupKeys.length}个Sheet）`, 'success');
					} catch (err) {
						console.error(err);
						showToast('导出失败：' + err.message, 'error');
					}
				}

				// ---------- 填充示例数据 ----------

				// ---------- 从 Firestore 实时同步数据 ----------
				function startDataSync() {
					if (unsubscribe) {
						unsubscribe(); // 取消旧监听
					}

					// 监听 testcases 集合（按创建时间升序）
					unsubscribe = db.collection('testcases')
						.orderBy('order', 'asc')
						.onSnapshot((snapshot) => {
							rows = []; // 清空并重新填充
							snapshot.forEach((doc) => {
								const data = doc.data();
								rows.push({
									id: doc.id, // ★ 保存文档 ID 用于更新/删除
									order: data.order || 0, // 保存 order
									title: data.title || '',
									precondition: data.precondition || '',
									priority: data.priority || 'P0',
									remark: data.remark || '',
									levels: data.levels || [],
									steps: data.steps || []
								});
							});
							renderTable(); // 重新绘制表格
						}, (error) => {
							console.error('监听数据失败:', error);
							showToast('数据同步失败，请检查网络', 'error');
						});
				}

				// ---------- 初始化函数（整合 Firebase 登录 + UI 初始化） ----------
				// ---------- 初始化函数（事件绑定与登录分离） ----------
				function init() {
					// 1. UI 渲染（不依赖 Firebase）
					applyFieldLabels();
					renderLevels(Array(levelCount).fill(''));
					renderSteps(Array(stepCount).fill({
						step: '',
						expected: ''
					}));
					initDragDrop();
					bindCheckAll();

					// 2. 按钮事件绑定
					levelsToggleHeader.addEventListener('click', toggleLevels);
					editLevelsTitle.addEventListener('click', function(e) {
						e.stopPropagation();
						openEditLevels();
					});
					editLevelsCancel.addEventListener('click', closeEditLevels);
					editLevelsOverlay.addEventListener('click', function(e) {
						if (e.target === editLevelsOverlay) closeEditLevels();
					});
					editLevelsSave.addEventListener('click', saveEditLevels);
					editLevelsAddBtn.addEventListener('click', editLevelsAddRow);
					editLevelsRemoveBtn.addEventListener('click', editLevelsRemoveLastRow);
					addLevelBtn.addEventListener('click', addLevel);
					removeLevelBtn.addEventListener('click', removeLastLevel);

					document.querySelectorAll('.edit-icon[data-target]').forEach(btn => {
						btn.addEventListener('click', function(e) {
							const target = this.getAttribute('data-target');
							openModal(target);
						});
					});
					document.getElementById('editSectionTitle').addEventListener('click', function() {
						openModal('sectionTitle');
					});

					modalConfirm.addEventListener('click', confirmModal);
					modalCancel.addEventListener('click', closeModal);
					modalOverlay.addEventListener('click', function(e) {
						if (e.target === modalOverlay) closeModal();
					});
					modalLabel.addEventListener('keydown', function(e) {
						if (e.key === 'Enter') confirmModal();
					});
					modalDefault.addEventListener('keydown', function(e) {
						if (e.key === 'Enter') confirmModal();
					});

					editCaseSave.addEventListener('click', saveEditCase);
					editCaseCancel.addEventListener('click', closeEditCase);
					editOverlay.addEventListener('click', function(e) {
						if (e.target === editOverlay) closeEditCase();
					});
					editAddStep.addEventListener('click', editAddStepHandler);
					editCaseLevelAddBtn.addEventListener('click', editCaseLevelAdd);
					editCaseLevelRemoveBtn.addEventListener('click', editCaseLevelRemoveLast);

					btnAdd.addEventListener('click', addRow);
					btnReset.addEventListener('click', resetInputs);
					btnFillDemo.addEventListener('click', fillDemo);
					btnExportTop.addEventListener('click', exportExcel);
					btnExportBottom.addEventListener('click', exportExcel);

					addStepBtn.addEventListener('click', addStep);
					removeStepBtn.addEventListener('click', removeLastStep);
					addStepBtnBottom.addEventListener('click', addStep);
					removeStepBtnBottom.addEventListener('click', removeLastStep);

					deleteSelected.addEventListener('click', deleteSelectedRows);
					clearAllCases.addEventListener('click', clearAllCasesHandler);

					document.querySelectorAll('.input-group input, .input-group textarea, .input-group select').forEach(
						el => {
							el.addEventListener('keydown', function(e) {
								if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
									e.preventDefault();
									addRow();
								}
							});
						});

					// ---- 表格事件委托（一次性绑定） ----
					// 操作按钮：编辑、删除、复制
					tableBody.addEventListener('click', function(e) {
						const btn = e.target.closest('.btn-action');
						if (!btn) return;
						e.stopPropagation();
						const index = parseInt(btn.dataset.index, 10);
						if (isNaN(index)) return;
						if (btn.classList.contains('edit')) {
							openEditCase(index);
						} else if (btn.classList.contains('delete')) {
							deleteRow(index);
						} else if (btn.classList.contains('copy')) {
							copyRow(index);
						}
					});

					// 拖拽排序（插入式）
					tableBody.addEventListener('dragstart', function(e) {
						const row = e.target.closest('tr.main-row');
						if (!row) return;
						if (!e.target.classList.contains('drag-handle-row')) {
							e.preventDefault();
							return;
						}
						const index = row.dataset.index;
						e.dataTransfer.setData('text/plain', index);
						e.dataTransfer.effectAllowed = 'move';
						row.classList.add('dragging');
					});

					tableBody.addEventListener('dragover', function(e) {
						e.preventDefault();
						e.dataTransfer.dropEffect = 'move';
						const targetRow = e.target.closest('tr.main-row');
						if (targetRow) {
							tableBody.querySelectorAll('tr.main-row').forEach(r => r.classList.remove('drag-over'));
							targetRow.classList.add('drag-over');
						}
					});

					tableBody.addEventListener('dragleave', function(e) {
						const targetRow = e.target.closest('tr.main-row');
						if (targetRow) {
							targetRow.classList.remove('drag-over');
						}
					});

					tableBody.addEventListener('drop', function(e) {
						e.preventDefault();
						const targetRow = e.target.closest('tr.main-row');
						if (!targetRow) return;
						targetRow.classList.remove('drag-over');

						const dragIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
						const dropIndex = parseInt(targetRow.dataset.index, 10);
						if (isNaN(dragIndex) || isNaN(dropIndex) || dragIndex === dropIndex) return;

						// 1. 从 rows 中移除拖拽项
						const newRows = [...rows];
						const [movedItem] = newRows.splice(dragIndex, 1);

						// 2. 计算插入位置（若目标在源之后，需调整索引）
						let insertIndex = dropIndex;
						if (dropIndex > dragIndex) {
							insertIndex = dropIndex - 1;
						}
						newRows.splice(insertIndex, 0, movedItem);

						// 3. 批量更新所有文档的 order 为新索引
						const batch = db.batch();
						newRows.forEach((row, idx) => {
							const ref = db.collection('testcases').doc(row.id);
							batch.update(ref, {
								order: idx
							});
						});
						batch.commit()
							.then(() => showToast('顺序已更新', 'success'))
							.catch(err => showToast('排序失败：' + err.message, 'error'));
					});

					tableBody.addEventListener('dragend', function(e) {
						const row = e.target.closest('tr.main-row');
						if (row) row.classList.remove('dragging');
						tableBody.querySelectorAll('tr.main-row.drag-over').forEach(r => r.classList.remove(
							'drag-over'));
					});

					// 3. 首次渲染表格
					renderTable();
					titleInput.focus();

					// 4. Firebase 登录 + 数据同步
					auth.signInAnonymously()
						.then(() => {
							console.log('✅ Firebase 匿名登录成功');
							startDataSync();
							showToast('已连接云端，数据实时同步', 'success');
						})
						.catch((err) => {
							console.error('❌ Firebase 登录失败', err);
							showToast('无法连接数据库，数据将保存在本地（刷新后丢失）', 'error');
						});
				}

				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', init);
				} else {
					init();
				}

			})();
		</script>
